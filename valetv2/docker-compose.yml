# ============================================
# 2M Parking — Docker Compose (Desenvolvimento)
# Uso: cp .env.docker.example .env.docker && docker-compose --env-file .env.docker up --build
# ============================================
version: "3.8"

services:
  # SQL Server (dev local — substitui MSSQL17.SQLEXPRESS)
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: 2mparking-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD}"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${SA_PASSWORD}" -C -Q "SELECT 1" -b
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Aplicação (Nginx + Node.js backend)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 2mparking-app
    ports:
      - "80:80"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_SERVER: db
      DB_PORT: 1433
      DB_NAME: MParking
      DB_USER: sa
      DB_PASSWORD: "${SA_PASSWORD}"
      DB_ENCRYPT: "false"
      JWT_SECRET: "${JWT_SECRET}"
      SETUP_KEY: "${SETUP_KEY}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost,http://localhost:80}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mssql-data:
    driver: local
